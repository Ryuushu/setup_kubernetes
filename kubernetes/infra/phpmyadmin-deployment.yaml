apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phpmyadmin
  template:
    metadata:
      labels:
        app: phpmyadmin
    spec:
      containers:
        - name: phpmyadmin
          image: phpmyadmin:5
          ports:
            - containerPort: 80
          env:
            - name: PMA_HOST
              value: mysql.infra.svc.cluster.local
            - name: PMA_PORT
              value: "3306"