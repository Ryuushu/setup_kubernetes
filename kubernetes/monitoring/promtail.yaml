apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push
        batchsize: 102400
        batchwait: 5s
        timeout: 10s

    scrape_configs:
      - job_name: containers

        static_configs:
          - targets:
              - localhost
            labels:
              job: containers
              __path__: /var/log/containers/*.log

        pipeline_stages:
          - docker: {}

          - match:
              selector: '{job="containers"}'
              stages:
                - drop:
                    expression: '.*health.*|.*debug.*'
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      containers:
      - name: promtail
        image: grafana/promtail:2.9.0

        args:
          - -config.file=/etc/promtail/promtail.yaml
          - -log.level=info

        securityContext:
          runAsUser: 0

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

        volumeMounts:
          - name: config
            mountPath: /etc/promtail
          - name: varlog
            mountPath: /var/log
          - name: containers
            mountPath: /var/log/containers
            readOnly: true

      volumes:
        - name: containers
          hostPath:
            path: /var/log/containers
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log